[workspace]
name = "Yogavasistha Part 1"
description = "Part 1 of the Yogavasistha, parsed from muktabodha.org"
path_schema = ["book", "chapter"]

[urn]
publisher = "muktabodha.org"
corpus = "yogavasistha"
hierarchy = ["book", "chapter", "verse"]

[build]
output = "yogavasistha.vyview"

# Mula (root text) configurations
[[streams]]
id = "mula_iast"
name = "IAST"
path = "content/mula_iast"

[[streams]]
id = "mula_devanagari"
name = "Devanagari"
path = "content/mula_devanagari"

[presentation.labels]
"chapter.0" = "Prologue"
"chapter.-1" = "Epilogue"
"book.0" = "Preface"
