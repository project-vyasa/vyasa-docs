<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yogavasistha</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif', serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            line-height: 1.6;
            color: #222;
            background-color: #fafafa;
        }

        /* Generic Vyasa Semantic Classes */
        .mula_devanagari {
            font-size: 1.3rem;
            color: #800000;
            margin: 1.5rem 0;
            line-height: 1.8;
        }

        .mula_iast {
            font-size: 1.1rem;
            font-style: italic;
            margin: 1.5rem 0;
        }

        .translation {
            font-weight: normal;
            font-size: 1.05rem;
            margin: 1.5rem 0;
        }

        .commentary {
            margin: 1.5rem 0;
            text-align: justify;
            font-size: 0.95rem;
            padding-left: 1rem;
            border-left: 2px solid #ccc;
        }

        .speaker, .uvacha {
            font-weight: bold;
            font-size: 0.9em;
            color: #444;
            display: block;
            margin-bottom: 0.5rem;
        }

        .verse {
            font-size: 1.1rem;
            margin: 1.5rem 0;
            line-height: 1.8;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <div class="content">
        {{ body }}
    </div>
</body>

</html>
